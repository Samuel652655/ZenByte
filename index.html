<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenByte</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

/* NAVBAR */

nav{
    background:#111827;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#00d9ff;
}

nav ul{
    display:flex;
    list-style:none;
    gap:25px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    transition:0.3s;
}

nav ul li a:hover{
    color:#00d9ff;
}

/* HERO */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:75px;
    color:#00d9ff;
    margin-bottom:20px;
}

.hero p{
    font-size:22px;
    max-width:700px;
    line-height:1.5;
    color:#cbd5e1;
}

.btn{
    margin-top:30px;
    padding:15px 35px;
    background:#00d9ff;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:white;
    transform:scale(1.05);
}

/* SERVICIOS */

.gallery{
    padding:80px 20px;
    background:#111827;
    text-align:center;
}

.gallery h2{
    font-size:45px;
    margin-bottom:50px;
    color:#00d9ff;
}

.gallery-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
}

.gallery-card{
    width:320px;
    height:220px;
    position:relative;
    overflow:hidden;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.gallery-card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    padding:20px;
}

.overlay h3{
    color:#00d9ff;
}

footer{
    background:#0f172a;
    text-align:center;
    padding:20px;
    color:#94a3b8;
}

</style>

</head>
<body>

<nav>

<div class="logo">ZenByte</div>

<ul>
<li><a href="index.html">Inicio</a></li>
<li><a href="computadoras.html">Computadoras</a></li>
<li><a href="iphone.html">iPhone</a></li>
<li><a href="web.html">Desarrollo Web</a></li>
</ul>

</nav>

<section class="hero">

<h1>ZenByte</h1>

<p>
Reparación de computadoras, iPhone y desarrollo web moderno.
Tecnología profesional con estilo.
</p>

<a href="#servicios" class="btn">
Ver Servicios
</a>

</section>

<section class="gallery" id="servicios">

<h2>Servicios</h2>

<div class="gallery-container">

<div class="gallery-card">
<img src="img/laptop.jpg">

<div class="overlay">
<h3>Computadoras</h3>
</div>
</div>

<div class="gallery-card">
<img src="img/iphone.jpg">

<div class="overlay">
<h3>iPhone</h3>
</div>
</div>

<div class="gallery-card">
<img src="img/web.jpg">

<div class="overlay">
<h3>Desarrollo Web</h3>
</div>
</div>

</div>

</section>

<footer>
© 2026 ZenByte
</footer>

</body>
</html>
